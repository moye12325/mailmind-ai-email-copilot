<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#161B22"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>

    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="40" x2="960" y2="40"/>
    <line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="200" x2="960" y2="200"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="280"/>
    <line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="480" y1="0" x2="480" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="840" y1="0" x2="840" y2="280"/>
  </g>

  <!-- Decorative orbs -->
  <circle cx="150" cy="140" r="80" fill="#A855F7" opacity="0.05"/>
  <circle cx="810" cy="140" r="80" fill="#06B6D4" opacity="0.05"/>
  <circle cx="480" cy="60" r="40" fill="#6366F1" opacity="0.03"/>

  <!-- Icon: Envelope + Brain hybrid -->
  <g transform="translate(480, 95)" filter="url(#iconGlow)">
    <!-- Envelope base -->
    <path d="M-35,-18 L-35,18 L35,18 L35,-18 Z" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Envelope flap -->
    <path d="M-35,-18 L0,8 L35,-18" fill="none" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Brain circuit lines inside envelope -->
    <circle cx="-10" cy="0" r="4" fill="none" stroke="url(#iconGrad)" stroke-width="1.5"/>
    <circle cx="10" cy="-2" r="3" fill="none" stroke="url(#iconGrad)" stroke-width="1.5"/>
    <line x1="-6" y1="0" x2="7" y2="-2" stroke="url(#iconGrad)" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="6" r="2" fill="url(#iconGrad)" opacity="0.4"/>
  </g>

  <!-- Main Title -->
  <text x="480" y="170" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="700" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="4">
    MailMind
  </text>

  <!-- Divider line -->
  <rect x="280" y="185" width="400" height="1.5" rx="1" fill="url(#lineGrad)"/>

  <!-- Tagline -->
  <text x="480" y="215" text-anchor="middle" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#8B949E" letter-spacing="3">
    Your inbox, distilled into decisions.
  </text>

  <!-- Bottom accent dots -->
  <circle cx="440" cy="240" r="2" fill="#A855F7" opacity="0.6"/>
  <circle cx="460" cy="240" r="2" fill="#818CF8" opacity="0.6"/>
  <circle cx="480" cy="240" r="2" fill="#6366F1" opacity="0.6"/>
  <circle cx="500" cy="240" r="2" fill="#3B82F6" opacity="0.6"/>
  <circle cx="520" cy="240" r="2" fill="#06B6D4" opacity="0.6"/>
</svg>
